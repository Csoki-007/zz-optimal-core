<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="210" viewBox="0 0 1200 210" role="img" aria-labelledby="title desc">
  <title id="title">zz-optimal-core performance card</title>
  <desc id="desc">A compact performance summary card with benchmark metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1728"/>
      <stop offset="100%" stop-color="#18283f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8a00"/>
      <stop offset="50%" stop-color="#42d392"/>
      <stop offset="100%" stop-color="#4da3ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="210" rx="26" fill="url(#bg)"/>
  <rect x="32" y="26" width="1136" height="158" rx="22" fill="#0c1423" stroke="#ffffff" stroke-opacity="0.08" filter="url(#shadow)"/>
  <rect x="54" y="42" width="88" height="22" rx="11" fill="url(#accent)"/>
  <text x="98" y="58" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#08101c">MEASURED</text>
  <text x="54" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Performance snapshot</text>
  <text x="54" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#9cb0d3">After profiling-driven optimization, the reverse FMC path became significantly faster and more stable.</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="54" y="142" width="176" height="28" rx="14" fill="#ffffff" fill-opacity="0.06"/>
    <text x="142" y="161" text-anchor="middle" font-size="14" fill="#dfe8ff">Avg time: 4.476 ms</text>

    <rect x="246" y="142" width="198" height="28" rx="14" fill="#ffffff" fill-opacity="0.06"/>
    <text x="345" y="161" text-anchor="middle" font-size="14" fill="#dfe8ff">Speedup: 50.2% vs baseline</text>

    <rect x="460" y="142" width="166" height="28" rx="14" fill="#ffffff" fill-opacity="0.06"/>
    <text x="543" y="161" text-anchor="middle" font-size="14" fill="#dfe8ff">Routes: 384</text>

    <rect x="642" y="142" width="220" height="28" rx="14" fill="#ffffff" fill-opacity="0.06"/>
    <text x="752" y="161" text-anchor="middle" font-size="14" fill="#dfe8ff">Best result: 30 moves on ESP32</text>

    <rect x="878" y="142" width="242" height="28" rx="14" fill="#ffffff" fill-opacity="0.06"/>
    <text x="999" y="161" text-anchor="middle" font-size="14" fill="#dfe8ff">Profiling runs: 1000 seeded solves</text>
  </g>
</svg>
