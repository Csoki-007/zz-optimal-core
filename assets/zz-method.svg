<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">ZZ method overview</title>
  <desc id="desc">A visual explanation of the ZZ cube solving method with edge orientation, line building, F2L, and ZBLL stages.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="55%" stop-color="#0b1728"/>
      <stop offset="100%" stop-color="#13233a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8a00"/>
      <stop offset="50%" stop-color="#42d392"/>
      <stop offset="100%" stop-color="#4da3ff"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1400" height="520" rx="34" fill="url(#bg)"/>
  <rect width="1400" height="520" rx="34" fill="url(#grid)"/>
  <circle cx="1080" cy="98" r="160" fill="#4da3ff" fill-opacity="0.10"/>
  <circle cx="250" cy="380" r="220" fill="#ff8a00" fill-opacity="0.10"/>
  <circle cx="1240" cy="370" r="190" fill="#42d392" fill-opacity="0.08"/>

  <text x="64" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">ZZ method</text>
  <text x="64" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#9fb3d6">A simple way to think about the solver: orient edges first, then finish the cube with fewer complications later.</text>

  <g transform="translate(64,144)" filter="url(#shadow)">
    <rect x="0" y="0" width="238" height="280" rx="28" fill="#0c1423" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="24" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Cube state</text>
    <text x="24" y="64" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#9fb3d6">Start from a scramble</text>

    <g transform="translate(40,92)">
      <rect x="0" y="0" width="52" height="52" rx="10" fill="#ff8a00"/>
      <rect x="58" y="0" width="52" height="52" rx="10" fill="#ffffff"/>
      <rect x="116" y="0" width="52" height="52" rx="10" fill="#4da3ff"/>
      <rect x="0" y="58" width="52" height="52" rx="10" fill="#42d392"/>
      <rect x="58" y="58" width="52" height="52" rx="10" fill="#ffffff"/>
      <rect x="116" y="58" width="52" height="52" rx="10" fill="#ffcf33"/>
      <rect x="0" y="116" width="52" height="52" rx="10" fill="#ffffff"/>
      <rect x="58" y="116" width="52" height="52" rx="10" fill="#ff4d6d"/>
      <rect x="116" y="116" width="52" height="52" rx="10" fill="#ffffff"/>
    </g>
  </g>

  <g transform="translate(336,166)">
    <path d="M0 70 C40 40, 70 40, 112 70" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    <path d="M102 58 L124 70 L102 82" fill="none" stroke="#42d392" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">1. EO</text>
    <text x="0" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#9fb3d6">Orient all edges</text>
    <rect x="0" y="80" width="160" height="126" rx="20" fill="#0c1423" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="26" y="108" width="28" height="28" rx="7" fill="#ffffff"/>
    <rect x="58" y="108" width="28" height="28" rx="7" fill="#ffffff"/>
    <rect x="90" y="108" width="28" height="28" rx="7" fill="#ffffff"/>
    <rect x="122" y="108" width="28" height="28" rx="7" fill="#ffffff"/>
    <rect x="26" y="140" width="28" height="28" rx="7" fill="#ffffff"/>
    <rect x="58" y="140" width="28" height="28" rx="7" fill="#42d392"/>
    <rect x="90" y="140" width="28" height="28" rx="7" fill="#ffffff"/>
    <rect x="122" y="140" width="28" height="28" rx="7" fill="#ffffff"/>
    <text x="80" y="200" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#cfe0ff">All edges face</text>
  </g>

  <g transform="translate(540,166)">
    <path d="M0 70 C40 40, 70 40, 112 70" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    <path d="M102 58 L124 70 L102 82" fill="none" stroke="#42d392" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">2. Line</text>
    <text x="0" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#9fb3d6">Build the line</text>
    <rect x="0" y="80" width="160" height="126" rx="20" fill="#0c1423" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="28" y="126" width="104" height="24" rx="12" fill="#ffffff"/>
    <rect x="28" y="126" width="104" height="24" rx="12" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="28" y="126" width="104" height="24" rx="12" fill="#ffcf33" fill-opacity="0.28"/>
    <text x="80" y="200" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#cfe0ff">A solved line</text>
  </g>

  <g transform="translate(744,166)">
    <path d="M0 70 C40 40, 70 40, 112 70" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    <path d="M102 58 L124 70 L102 82" fill="none" stroke="#42d392" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">3. F2L</text>
    <text x="0" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#9fb3d6">Solve first two layers</text>
    <rect x="0" y="80" width="160" height="126" rx="20" fill="#0c1423" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="28" y="106" width="36" height="36" rx="9" fill="#ffffff"/>
    <rect x="68" y="106" width="36" height="36" rx="9" fill="#4da3ff"/>
    <rect x="28" y="146" width="36" height="36" rx="9" fill="#42d392"/>
    <rect x="68" y="146" width="36" height="36" rx="9" fill="#ffffff"/>
    <rect x="108" y="106" width="24" height="76" rx="9" fill="#ffffff" fill-opacity="0.10"/>
    <text x="80" y="200" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#cfe0ff">Build pairs</text>
  </g>

  <g transform="translate(948,166)">
    <path d="M0 70 C40 40, 70 40, 112 70" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    <path d="M102 58 L124 70 L102 82" fill="none" stroke="#42d392" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">4. ZBLL</text>
    <text x="0" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#9fb3d6">Finish last layer</text>
    <rect x="0" y="80" width="160" height="126" rx="20" fill="#0c1423" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="24" y="102" width="112" height="20" rx="10" fill="#ff8a00" fill-opacity="0.24"/>
    <rect x="24" y="126" width="112" height="20" rx="10" fill="#ffcf33" fill-opacity="0.24"/>
    <rect x="24" y="150" width="112" height="20" rx="10" fill="#4da3ff" fill-opacity="0.24"/>
    <text x="80" y="200" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#cfe0ff">One last case</text>
  </g>

  <g transform="translate(1160,166)">
    <text x="-10" y="26" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Solved</text>
    <rect x="-26" y="80" width="110" height="126" rx="20" fill="#0c1423" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="-2" y="104" width="62" height="62" rx="14" fill="#ffffff"/>
    <rect x="0" y="106" width="58" height="58" rx="12" fill="none" stroke="#42d392" stroke-width="4"/>
    <text x="29" y="192" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#cfe0ff">Done</text>
  </g>
</svg>
