<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">zz-optimal-core hero banner</title>
  <desc id="desc">A dark editorial banner with Rubik cube inspired blocks and solver metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0a1425"/>
      <stop offset="100%" stop-color="#111f34"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a00"/>
      <stop offset="35%" stop-color="#ffcf33"/>
      <stop offset="70%" stop-color="#42d392"/>
      <stop offset="100%" stop-color="#4da3ff"/>
    </linearGradient>
    <linearGradient id="cube" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f7f7"/>
      <stop offset="100%" stop-color="#c7ceda"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#4da3ff" flood-opacity="0.35"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1400" height="420" fill="url(#bg)"/>
  <rect width="1400" height="420" fill="url(#grid)"/>
  <circle cx="1130" cy="76" r="160" fill="#4da3ff" fill-opacity="0.12"/>
  <circle cx="220" cy="334" r="200" fill="#ff8a00" fill-opacity="0.10"/>
  <circle cx="1080" cy="302" r="220" fill="#42d392" fill-opacity="0.08"/>

  <g transform="translate(70,68)">
    <rect x="0" y="0" width="190" height="34" rx="17" fill="#ffffff" fill-opacity="0.08"/>
    <text x="95" y="22" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#dfe8ff" letter-spacing="2">ZZOPTIMALCORE</text>

    <text x="0" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff">zz-optimal-core</text>
    <text x="0" y="164" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#c8d5ee">Rubik's Cube solver core for normal solve, FMC, reverse FMC and pattern modes.</text>
    <text x="0" y="198" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#9cb0d3">Desktop ready. ESP32 ready. Built for a solving robot pipeline.</text>
  </g>

  <g transform="translate(72,260)" filter="url(#glow)">
    <rect x="0" y="0" width="174" height="58" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="87" y="24" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#d9e5fb">DIRECT + REVERSE</text>
    <text x="87" y="44" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">384 routes</text>
  </g>

  <g transform="translate(268,260)">
    <rect x="0" y="0" width="174" height="58" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="87" y="24" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#d9e5fb">EMBEDDED READY</text>
    <text x="87" y="44" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">ESP32</text>
  </g>

  <g transform="translate(464,260)">
    <rect x="0" y="0" width="174" height="58" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="87" y="24" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#d9e5fb">PATTERN MODES</text>
    <text x="87" y="44" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">7 presets</text>
  </g>

  <g transform="translate(882,84)" filter="url(#shadow)">
    <rect x="0" y="0" width="360" height="252" rx="28" fill="#0d1627" fill-opacity="0.96" stroke="#ffffff" stroke-opacity="0.10"/>
    <rect x="32" y="30" width="60" height="60" rx="12" fill="#ff8a00"/>
    <rect x="96" y="30" width="60" height="60" rx="12" fill="#ffffff"/>
    <rect x="160" y="30" width="60" height="60" rx="12" fill="#4da3ff"/>
    <rect x="224" y="30" width="60" height="60" rx="12" fill="#42d392"/>
    <rect x="288" y="30" width="40" height="60" rx="12" fill="#ffcf33"/>

    <rect x="32" y="94" width="60" height="60" rx="12" fill="#ffffff"/>
    <rect x="96" y="94" width="60" height="60" rx="12" fill="#ff4d6d"/>
    <rect x="160" y="94" width="60" height="60" rx="12" fill="#ffffff"/>
    <rect x="224" y="94" width="60" height="60" rx="12" fill="#ffffff"/>
    <rect x="288" y="94" width="40" height="60" rx="12" fill="#4da3ff"/>

    <rect x="32" y="158" width="60" height="60" rx="12" fill="#42d392"/>
    <rect x="96" y="158" width="60" height="60" rx="12" fill="#ffffff"/>
    <rect x="160" y="158" width="60" height="60" rx="12" fill="#ff8a00"/>
    <rect x="224" y="158" width="60" height="60" rx="12" fill="#ffffff"/>
    <rect x="288" y="158" width="40" height="60" rx="12" fill="#ffcf33"/>

    <rect x="0" y="0" width="360" height="252" rx="28" fill="none" stroke="url(#accent)" stroke-opacity="0.35"/>
  </g>

  <g transform="translate(984,340)">
    <rect x="0" y="0" width="18" height="18" rx="5" fill="#ff8a00"/>
    <rect x="24" y="0" width="18" height="18" rx="5" fill="#ffcf33"/>
    <rect x="48" y="0" width="18" height="18" rx="5" fill="#42d392"/>
    <rect x="72" y="0" width="18" height="18" rx="5" fill="#4da3ff"/>
    <rect x="96" y="0" width="18" height="18" rx="5" fill="#ffffff"/>
  </g>
</svg>
