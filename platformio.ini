[platformio]
default_envs = esp32-wroom-32d

[env:esp32-wroom-32d]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = huge_app.csv
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -DARDUINO_USB_CDC_ON_BOOT=0
    ; Recommended release default: keep benchmark code out of the firmware.
    ; Set to 1 only when using NormalBenchmark or FmcBenchmark.
    -DZZ_ESP32_ENABLE_BENCHMARK=0
build_src_filter =
    +<app_runner.cpp>
    +<eo_solver.cpp>
    +<esp32_main.cpp>
    +<f2l_solver.cpp>
    +<line_solver.cpp>
    +<zz_platform.cpp>
    +<zbll_solver.cpp>
    +<ZZOptimalCore.cpp>
    -<main.cpp>
